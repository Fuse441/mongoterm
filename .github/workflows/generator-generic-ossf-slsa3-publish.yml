name: SLSA Provenance

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # Package the release artifact
      - name: Create archive
        run: |
          mkdir release
          cp -r dist package.json README.md LICENSE release/
          tar -czf mongoterm-linux-amd64.tar.gz release

      # Upload so the provenance workflow can access it
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mongoterm-linux-amd64
          path: mongoterm-linux-amd64.tar.gz

      - name: Generate provenance subjects
        id: hash
        shell: bash
        run: |
          set -euo pipefail

          sha256sum mongoterm-linux-amd64.tar.gz \
            | base64 -w0 \
            | {
              read hashes
              echo "hashes=$hashes" >> "$GITHUB_OUTPUT"
            }

  provenance:
    needs: build

    permissions:
      actions: read
      contents: write
      id-token: write

    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0

    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      upload-assets: true
