name: Publish to npm

# Manual publish workflow.

# Run from:

# Actions -> Publish to npm -> Run workflow

on:
workflow_dispatch:

permissions:
contents: read
id-token: write # required for npm provenance

jobs:
publish:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 22
      registry-url: "https://registry.npmjs.org"
      cache: npm

  - name: Install dependencies
    run: npm ci

  - name: Build project
    run: npm run build

  - name: Determine npm dist-tag
    id: dist-tag
    run: |
      set -euo pipefail

      VERSION="$(node -p "require('./package.json').version")"

      if [[ "$VERSION" == *-* ]]; then
        # e.g. 1.2.3-alpha.0 -> alpha
        PRE_ID="$(echo "$VERSION" | sed -E 's/^[^-]+-([a-zA-Z]+).*/\1/')"
        echo "tag=${PRE_ID:-alpha}" >> "$GITHUB_OUTPUT"
      else
        echo "tag=latest" >> "$GITHUB_OUTPUT"
      fi

      echo "Version: $VERSION"
      echo "Dist Tag: $(cat $GITHUB_OUTPUT | tail -n1)"

  - name: Publish to npm
    run: npm publish --tag "${{ steps.dist-tag.outputs.tag }}" --access public --provenance
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  - name: Summary
    run: |
      VERSION="$(node -p "require('./package.json').version")"

      echo "### 📦 Published mongoterm@${VERSION}" >> "$GITHUB_STEP_SUMMARY"
      echo "" >> "$GITHUB_STEP_SUMMARY"
      echo "- npm dist-tag: \`${{ steps.dist-tag.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
      echo "- package version: \`${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
      echo "- npm package: https://www.npmjs.com/package/mongoterm/v/${VERSION}" >> "$GITHUB_STEP_SUMMARY"
```
